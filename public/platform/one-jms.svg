<svg width="462" height="587" viewBox="0 0 462 587" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="jmsScreen" x1="231" y1="56" x2="231" y2="573" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171c20"/>
      <stop offset="0.5" stop-color="#11161a"/>
      <stop offset="1" stop-color="#0d1114"/>
    </linearGradient>
    <linearGradient id="jmsSheen" x1="231" y1="56" x2="231" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="jmsGrid" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0 0H34M0 0V34" stroke="#5d7488" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="jmsScreenClip">
      <rect x="14" y="56" width="434" height="517" rx="20"/>
    </clipPath>
  </defs>

  <!-- Outer panel (corners are rounded by the card's CSS) -->
  <rect width="462" height="587" fill="#1b1917"/>

  <!-- Header -->
  <text x="20" y="41" fill="#8c8c8c" font-size="16" font-weight="600" letter-spacing="4">ONE JMS</text>
  <circle cx="410" cy="36" r="4.5" fill="#f87a13"/>
  <circle cx="426" cy="36" r="4.5" fill="#4d4a47"/>
  <circle cx="442" cy="36" r="4.5" fill="#4d4a47"/>

  <!-- Inner screen -->
  <rect x="14" y="56" width="434" height="517" rx="20" fill="url(#jmsScreen)"/>
  <g clip-path="url(#jmsScreenClip)">
    <rect x="14" y="56" width="434" height="517" fill="url(#jmsGrid)"/>
    <rect x="14" y="56" width="434" height="517" fill="url(#jmsSheen)"/>
  </g>
  <rect x="14.5" y="56.5" width="433" height="516" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Title -->
  <text x="42" y="116" fill="#ffffff" font-size="22" font-weight="700">Incident Breakdown</text>

  <!-- High Priority -->
  <rect x="42" y="146" width="378" height="58" rx="15" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.10"/>
  <path d="M64 166 L55 183 L73 183 Z" fill="none" stroke="#e5484d" stroke-width="2" stroke-linejoin="round"/>
  <text x="88" y="181" fill="#f2f2f2" font-size="18" font-weight="500">High Priority</text>
  <text x="400" y="181" fill="#ffffff" font-size="18" font-weight="600" text-anchor="end">6</text>

  <!-- Medium Priority -->
  <rect x="42" y="220" width="378" height="58" rx="15" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.10"/>
  <rect x="55" y="240" width="18" height="18" rx="4" fill="none" stroke="#e0a93b" stroke-width="2"/>
  <text x="88" y="255" fill="#f2f2f2" font-size="18" font-weight="500">Medium Priority</text>
  <text x="400" y="255" fill="#ffffff" font-size="18" font-weight="600" text-anchor="end">3</text>

  <!-- Low Priority -->
  <rect x="42" y="294" width="378" height="58" rx="15" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.10"/>
  <path d="M55 315 L73 315 L64 332 Z" fill="none" stroke="#27c06b" stroke-width="2" stroke-linejoin="round"/>
  <text x="88" y="329" fill="#f2f2f2" font-size="18" font-weight="500">Low Priority</text>
  <text x="400" y="329" fill="#ffffff" font-size="18" font-weight="600" text-anchor="end">3</text>

  <!-- Divider -->
  <line x1="42" y1="382" x2="420" y2="382" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- Total -->
  <text x="42" y="420" fill="#ffffff" font-size="20" font-weight="700">Total Incidents</text>
  <text x="420" y="420" fill="#ffffff" font-size="20" font-weight="700" text-anchor="end">12</text>
</svg>
